services:
  postgres:
    image: postgres:16-alpine
    container_name: chcupracu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chcupracu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - chcupracu-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chcupracu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chcupracu-postgres:
